<box [style]="{ flexDirection: 'column', padding: 1 }">
    <box [style]="{ marginBottom: 1 }">
        <text>
            Press Tab to focus next element, Shift+Tab to focus previous element, Esc to reset
            focus.
        </text>
    </box>
    <ink-item id="1" label="Press 1 to focus" />
    <ink-item id="2" label="Press 2 to focus" />
    <ink-item id="3" label="Press 3 to focus" />
</box>
